<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Stackly Aquaculture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="auth-page">

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <i class="ph-fill ph-waves"></i> Stackly
      </a>
      
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="species.html">Species</a></li>
        <li><a href="technology.html">Technology</a></li>
        <li><a href="sustainability.html">Sustainability</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>

      <div class="nav-actions">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
          <i class="ph ph-moon"></i>
        </button>
        <a href="login.html" class="btn btn-primary">Login</a>
        <button id="mobile-menu-btn" class="mobile-menu-btn">
          <i class="ph ph-list"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="hero-bg" data-speed="0.5" style="background-image: url('assets/images/tech-hero.webp'); position: fixed; top:0; left:0; width:100%; height:100%; z-index:-2;"></div>
  <div class="hero-overlay" style="position: fixed; z-index:-1; background: rgba(15, 23, 42, 0.8);"></div>

  <div class="auth-container fade-up" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="glass-panel" style="width: 100%; max-width: 600px; padding: 3rem 2rem;">
      <div style="text-align: center; margin-bottom: 2rem;">
        <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1rem;">
          <i class="ph-fill ph-waves"></i> Stackly
        </a>
        <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Create an Account</h2>
        <p style="color: var(--color-text-muted);">Join Stackly and modernize your farm</p>
      </div>

      <form id="signup-form">
        <div class="form-grid" style="margin-bottom: 1rem;">
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Full Name</label>
            <input type="text" style="width: 100%; padding: 0.8rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--color-glass-border); background: rgba(255,255,255,0.05); color: var(--color-text); outline: none;" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Phone Number</label>
            <input type="tel" style="width: 100%; padding: 0.8rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--color-glass-border); background: rgba(255,255,255,0.05); color: var(--color-text); outline: none;" placeholder="+1 234 567 8900" required>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 1rem;">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email Address</label>
          <input type="email" style="width: 100%; padding: 0.8rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--color-glass-border); background: rgba(255,255,255,0.05); color: var(--color-text); outline: none;" placeholder="john@example.com" required>
        </div>

        <div class="form-grid" style="margin-bottom: 1rem;">
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Company / Farm Name</label>
            <input type="text" style="width: 100%; padding: 0.8rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--color-glass-border); background: rgba(255,255,255,0.05); color: var(--color-text); outline: none;" placeholder="OceanBlue Farms" required>
          </div>
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Farm Location</label>
            <input type="text" style="width: 100%; padding: 0.8rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--color-glass-border); background: rgba(255,255,255,0.05); color: var(--color-text); outline: none;" placeholder="City, Country" required>
          </div>
        </div>

        <div class="form-grid" style="margin-bottom: 1rem;">
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
            <input type="password" style="width: 100%; padding: 0.8rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--color-glass-border); background: rgba(255,255,255,0.05); color: var(--color-text); outline: none;" placeholder="••••••••" required>
          </div>
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Confirm Password</label>
            <input type="password" style="width: 100%; padding: 0.8rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--color-glass-border); background: rgba(255,255,255,0.05); color: var(--color-text); outline: none;" placeholder="••••••••" required>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Role</label>
          <select id="role" style="width: 100%; padding: 0.8rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--color-glass-border); background: rgba(15, 23, 42, 0.8); color: white; outline: none; appearance: none; cursor:pointer;" required>
            <option value="manager">Farm Manager</option>
            <option value="admin">Administrator</option>
          </select>
        </div>

        <div style="margin-bottom: 2rem; font-size: 0.9rem;">
          <label style="display: flex; align-items: flex-start; gap: 0.5rem; cursor: pointer; line-height: 1.4;">
            <input type="checkbox" required style="accent-color: var(--color-primary); margin-top: 0.2rem;"> 
            <span>I agree to the <a href="#" style="color: var(--color-primary);">Terms & Conditions</a> and <a href="#" style="color: var(--color-primary);">Privacy Policy</a>.</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem; justify-content: center;">Create Account <i class="ph ph-user-plus"></i></button>

        <p style="text-align: center; font-size: 0.9rem;">
          Already have an account? <a href="login.html" style="color: var(--color-primary); font-weight: 600;">Log In</a>
        </p>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    gsap.fromTo('.fade-up', {y: 30, opacity: 0}, {y: 0, opacity: 1, duration: 0.8, ease: 'power3.out'});
    
    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      // Redirect to login page upon success
      alert('Account created successfully! Please log in.');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
