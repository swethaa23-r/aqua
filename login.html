<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Stackly Aquaculture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <i class="ph-fill ph-waves"></i> Stackly
      </a>
      
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="species.html">Species</a></li>
        <li><a href="technology.html">Technology</a></li>
        <li><a href="sustainability.html">Sustainability</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>

      <div class="nav-actions">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
          <i class="ph ph-moon"></i>
        </button>
        <a href="login.html" class="btn btn-primary">Login</a>
        <button id="mobile-menu-btn" class="mobile-menu-btn">
          <i class="ph ph-list"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="hero-bg" data-speed="0.5" style="background-image: url('assets/images/tech-hero.webp'); position: fixed; top:0; left:0; width:100%; height:100%; z-index:-2;"></div>
  <div class="hero-overlay" style="position: fixed; z-index:-1; background: rgba(15, 23, 42, 0.8);"></div>

  <div class="auth-container fade-up" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="glass-panel" style="width: 100%; max-width: 450px; padding: 3rem 2rem;">
      <div style="text-align: center; margin-bottom: 2rem;">
        <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1rem;">
          <i class="ph-fill ph-waves"></i> Stackly
        </a>
        <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Welcome Back</h2>
        <p style="color: var(--color-text-muted);">Sign in to access your dashboard</p>
      </div>

      <form id="login-form">
        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email Address</label>
          <input type="email" id="email" style="width: 100%; padding: 0.8rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--color-glass-border); background: rgba(255,255,255,0.05); color: var(--color-text); outline: none;" placeholder="Enter your email" required>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
          <input type="password" id="password" style="width: 100%; padding: 0.8rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--color-glass-border); background: rgba(255,255,255,0.05); color: var(--color-text); outline: none;" placeholder="Enter your password" required>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label for="role" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Role</label>
          <select id="role" style="width: 100%; padding: 0.8rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--color-glass-border); background: rgba(15, 23, 42, 0.8); color: white; outline: none; appearance: none; cursor:pointer;" required>
            <option value="manager">Farm Manager</option>
            <option value="admin">Administrator</option>
          </select>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-size: 0.9rem;">
          <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
            <input type="checkbox" id="remember" style="accent-color: var(--color-primary);"> Remember Me
          </label>
          <a href="#" style="color: var(--color-primary); font-weight: 500;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem; justify-content: center;">Login <i class="ph ph-sign-in"></i></button>

        <p style="text-align: center; font-size: 0.9rem;">
          Don't have an account? <a href="signup.html" style="color: var(--color-primary); font-weight: 600;">Sign Up</a>
        </p>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    gsap.fromTo('.fade-up', {y: 30, opacity: 0}, {y: 0, opacity: 1, duration: 0.8, ease: 'power3.out'});
    
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const role = document.getElementById('role').value;
      if (role === 'admin') {
        window.location.href = 'dashboard-admin.html';
      } else {
        window.location.href = 'dashboard-manager.html';
      }
    });
  </script>
</body>
</html>
